<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>KUBIX - Бьюти-коворкинг</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- QR Code Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dark': '#0a0a0f',
                        'card': '#1a1a2e',
                        'accent': '#c9a84c',
                        'accent-light': '#e8d5a3',
                        'glass': 'rgba(26, 26, 46, 0.7)',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .glass-effect {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 168, 76, 0.1);
        }
        
        .gradient-accent {
            background: linear-gradient(135deg, #c9a84c 0%, #e8d5a3 50%, #c9a84c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #c9a84c 0%, #b8941f 100%);
            border: none;
            color: #0a0a0f;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
        }
        
        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(201, 168, 76, 0.2);
        }
        
        .btn-secondary {
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.3);
            color: #c9a84c;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:active {
            background: rgba(201, 168, 76, 0.2);
            transform: scale(0.95);
        }
        
        .cube-container {
            width: 250px;
            height: 250px;
            margin: 0 auto;
            perspective: 1000px;
        }
        
        .screen {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        .screen.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .floating {
            animation: float 3s ease-in-out infinite;
        }
        
        .qr-code-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
        }
        
        .date-picker, .time-picker {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(201, 168, 76, 0.3);
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            margin-top: 8px;
        }
        
        .date-picker:focus, .time-picker:focus {
            outline: none;
            border-color: #c9a84c;
            box-shadow: 0 0 15px rgba(201, 168, 76, 0.2);
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
        
        .nav-item {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: #c9a84c;
        }
        
        .nav-item.active i {
            text-shadow: 0 0 20px rgba(201, 168, 76, 0.5);
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen max-w-md mx-auto relative pb-20">
        
        <!-- Экран 1: Главная -->
        <div id="home-screen" class="screen active p-6">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold gradient-accent mb-2">KUBIX</h1>
                <p class="text-gray-400 text-sm">Бьюти-коворкинг премиум-класса</p>
            </div>
            
            <!-- 3D Куб с балансом -->
            <div class="cube-container mb-8 floating" id="cube-container">
                <div id="three-cube" style="width: 100%; height: 100%;"></div>
                <div class="text-center -mt-6 relative z-10">
                    <p class="text-gray-400 text-xs mb-1">Ваш баланс</p>
                    <p class="text-3xl font-bold gradient-accent" id="balance-display">150</p>
                    <p class="text-gray-500 text-xs">кубиков</p>
                </div>
            </div>
            
            <!-- Пакеты кубиков -->
            <div class="space-y-3">
                <h3 class="text-lg font-semibold text-white mb-4">Пополнить баланс</h3>
                
                <button class="w-full p-4 rounded-2xl glass-effect flex justify-between items-center" onclick="purchaseCubes(50, 500)">
                    <div>
                        <p class="text-white font-medium">50 кубиков</p>
                        <p class="text-gray-400 text-xs">Идеально для старта</p>
                    </div>
                    <div class="text-right">
                        <p class="text-accent font-bold">500 ₽</p>
                        <p class="text-gray-500 text-xs">10 ₽/кубик</p>
                    </div>
                </button>
                
                <button class="w-full p-4 rounded-2xl glass-effect flex justify-between items-center border border-accent/30" onclick="purchaseCubes(100, 900)">
                    <div>
                        <p class="text-white font-medium">100 кубиков</p>
                        <p class="text-gray-400 text-xs">Популярный выбор</p>
                    </div>
                    <div class="text-right">
                        <p class="text-accent font-bold">900 ₽</p>
                        <p class="text-gray-500 text-xs">9 ₽/кубик</p>
                    </div>
                </button>
                
                <button class="w-full p-4 rounded-2xl glass-effect flex justify-between items-center" onclick="purchaseCubes(300, 2400)">
                    <div>
                        <p class="text-white font-medium">300 кубиков</p>
                        <p class="text-gray-400 text-xs">Максимальная выгода</p>
                    </div>
                    <div class="text-right">
                        <p class="text-accent font-bold">2 400 ₽</p>
                        <p class="text-gray-500 text-xs">8 ₽/кубик</p>
                        <span class="inline-block bg-accent/20 text-accent text-xs px-2 py-1 rounded-full mt-1">-20%</span>
                    </div>
                </button>
            </div>
        </div>
        
        <!-- Экран 2: Локации -->
        <div id="locations-screen" class="screen p-6">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-bold gradient-accent">Локации</h2>
                <p class="text-gray-400 text-sm mt-2">Бьюти-коворкинги Нижнего Новгорода</p>
            </div>
            
            <div class="space-y-4" id="locations-list">
                <!-- Локации будут добавляться динамически -->
            </div>
        </div>
        
        <!-- Экран 3: Профиль -->
        <div id="profile-screen" class="screen p-6">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-bold gradient-accent">Профиль</h2>
                <div class="mt-4 glass-effect p-4 rounded-2xl inline-block">
                    <p class="text-gray-400 text-sm">Текущий баланс</p>
                    <p class="text-3xl font-bold gradient-accent" id="profile-balance">150</p>
                    <p class="text-gray-500 text-xs">кубиков</p>
                </div>
            </div>
            
            <h3 class="text-xl font-semibold text-white mb-4">Мои бронирования</h3>
            <div class="space-y-4" id="bookings-list">
                <!-- Бронирования будут добавляться динамически -->
            </div>
        </div>
        
        <!-- Навигация -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto glass-effect border-t border-accent/10 px-6 py-3 flex justify-around items-center z-50">
            <div class="nav-item active text-center" onclick="switchScreen('home')">
                <i class="fas fa-cube text-xl"></i>
                <p class="text-xs mt-1">Главная</p>
            </div>
            <div class="nav-item text-center" onclick="switchScreen('locations')">
                <i class="fas fa-map-marker-alt text-xl"></i>
                <p class="text-xs mt-1">Локации</p>
            </div>
            <div class="nav-item text-center" onclick="switchScreen('profile')">
                <i class="fas fa-user text-xl"></i>
                <p class="text-xs mt-1">Профиль</p>
            </div>
        </nav>
    </div>

    <script>
        // Состояние приложения
        let appState = {
            balance: 150,
            bookings: [],
            currentScreen: 'home'
        };
        
        // Инициализация локаций
        const locations = [
            {
                id: 1,
                name: "KUBIX Центр",
                address: "ул. Большая Покровская, 47",
                rating: 4.9,
                price: 2,
                image: "https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=400",
                amenities: ["Премиум кресла", "LED-освещение", "Кофе-бар"]
            },
            {
                id: 2,
                name: "KUBIX Горьковская",
                address: "ул. Горького, 152",
                rating: 4.8,
                price: 2,
                image: "https://images.unsplash.com/photo-1487412912498-0447578fcca8?w=400",
                amenities: ["VIP-зона", "Стойка ресепшн", "Парковка"]
            },
            {
                id: 3,
                name: "KUBIX Стрелка",
                address: "ул. Совнаркомовская, 20",
                rating: 4.7,
                price: 1,
                image: "https://images.unsplash.com/photo-1560066984-138dadb4c035?w=400",
                amenities: ["Панорамные окна", "Кондиционер", "Wi-Fi"]
            },
            {
                id: 4,
                name: "KUBIX Верхние Печеры",
                address: "ул. Казанское шоссе, 10к1",
                rating: 4.9,
                price: 2,
                image: "https://images.unsplash.com/photo-1560750588-73207b1ef5b8?w=400",
                amenities: ["Премиум интерьер", "Фото-зона", "Лаунж"]
            }
        ];
        
        // Инициализация Three.js куба
        function initThreeCube() {
            const container = document.getElementById('three-cube');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            
            renderer.setSize(250, 250);
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);
            
            // Создание геометрического куба
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            
            // Создание материала с золотым оттенком
            const material = new THREE.MeshPhongMaterial({
                color: 0xc9a84c,
                emissive: 0x1a1a2e,
                shininess: 100,
                transparent: true,
                opacity: 0.9,
                wireframe: false
            });
            
            const cube = new THREE.Mesh(geometry, material);
            
            // Добавление граней
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xe8d5a3, linewidth: 1 }));
            cube.add(line);
            
            scene.add(cube);
            
            // Освещение
            const light1 = new THREE.PointLight(0xc9a84c, 1, 100);
            light1.position.set(5, 5, 5);
            scene.add(light1);
            
            const light2 = new THREE.PointLight(0x1a1a2e, 0.5, 100);
            light2.position.set(-5, -5, -5);
            scene.add(light2);
            
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            
            camera.position.z = 5;
            
            // Анимация
            function animate() {
                requestAnimationFrame(animate);
                
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
                
                renderer.render(scene, camera);
            }
            
            animate();
        }
        
        // Переключение экранов
        function switchScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(`${screen}-screen`).classList.add('active');
            document.querySelector(`[onclick="switchScreen('${screen}')"]`).classList.add('active');
            
            appState.currentScreen = screen;
            
            if (screen === 'locations') renderLocations();
            if (screen === 'profile') renderBookings();
            if (screen === 'home') updateBalanceDisplay();
        }
        
        // Покупка кубиков
        function purchaseCubes(amount, price) {
            if (confirm(`Купить ${amount} кубиков за ${price} ₽?`)) {
                // Имитация платежа
                setTimeout(() => {
                    appState.balance += amount;
                    updateBalanceDisplay();
                    alert(`✅ Успешно! ${amount} кубиков добавлены на ваш баланс`);
                }, 500);
            }
        }
        
        // Обновление отображения баланса
        function updateBalanceDisplay() {
            document.getElementById('balance-display').textContent = appState.balance;
            document.getElementById('profile-balance').textContent = appState.balance;
        }
        
        // Отображение локаций
        function renderLocations() {
            const container = document.getElementById('locations-list');
            container.innerHTML = '';
            
            locations.forEach(location => {
                const card = document.createElement('div');
                card.className = 'glass-effect rounded-2xl overflow-hidden';
                card.innerHTML = `
                    <div class="relative h-40 bg-cover bg-center" style="background-image: url('${location.image}')">
                        <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
                        <div class="absolute bottom-3 left-3">
                            <span class="bg-accent/20 backdrop-blur-sm text-accent px-3 py-1 rounded-full text-sm">
                                ⭐ ${location.rating}
                            </span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="text-xl font-bold text-white mb-1">${location.name}</h3>
                        <p class="text-gray-400 text-sm mb-3">📍 ${location.address}</p>
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${location.amenities.map(a => `<span class="text-xs bg-accent/10 text-accent-light px-2 py-1 rounded-full">${a}</span>`).join('')}
                        </div>
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-accent font-bold text-lg">${location.price} 🧊/час</p>
                                <p class="text-gray-500 text-xs">1 час аренды</p>
                            </div>
                            <button class="btn-primary px-4 py-2 rounded-xl" onclick="openBooking(${location.id})">
                                Забронировать
                            </button>
                        </div>
                        <div id="booking-form-${location.id}" class="hidden mt-4">
                            <div class="border-t border-accent/20 pt-4">
                                <label class="text-sm text-gray-300">Дата:</label>
                                <input type="date" id="date-${location.id}" class="date-picker" min="${new Date().toISOString().split('T')[0]}">
                                <label class="text-sm text-gray-300 mt-3 block">Время:</label>
                                <input type="time" id="time-${location.id}" class="time-picker">
                                <label class="text-sm text-gray-300 mt-3 block">Длительность (часов):</label>
                                <select id="duration-${location.id}" class="date-picker">
                                    <option value="1">1 час - ${location.price} кубиков</option>
                                    <option value="2">2 часа - ${location.price * 2} кубиков</option>
                                    <option value="3">3 часа - ${location.price * 3} кубиков</option>
                                    <option value="4">4 часа - ${location.price * 4} кубиков</option>
                                </select>
                                <button class="btn-primary w-full mt-4 py-2 rounded-xl" onclick="confirmBooking(${location.id})">
                                    Подтвердить бронирование
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        // Открытие формы бронирования
        function openBooking(locationId) {
            const form = document.getElementById(`booking-form-${locationId}`);
            form.classList.toggle('hidden');
        }
        
        // Подтверждение бронирования
        function confirmBooking(locationId) {
            const date = document.getElementById(`date-${locationId}`).value;
            const time = document.getElementById(`time-${locationId}`).value;
            const duration = parseInt(document.getElementById(`duration-${locationId}`).value);
            const location = locations.find(l => l.id === locationId);
            
            if (!date || !time) {
                alert('Пожалуйста, выберите дату и время');
                return;
            }
            
            const totalCubes = location.price * duration;
            
            if (appState.balance < totalCubes) {
                alert('❌ Недостаточно кубиков! Пополните баланс');
                return;
            }
            
            appState.balance -= totalCubes;
            updateBalanceDisplay();
            
            const booking = {
                id: Date.now(),
                locationName: location.name,
                address: location.address,
                date: date,
                time: time,
                duration: duration,
                totalCubes: totalCubes,
                status: 'Активно',
                qrCode: `KUBIX-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`
            };
            
            appState.bookings.push(booking);
            
            document.getElementById(`booking-form-${locationId}`).classList.add('hidden');
            
            alert(`✅ Забронировано! ${location.name}\n${date} в ${time}\nНа ${duration} час(а)\nСписано: ${totalCubes} кубиков`);
            
            renderLocations();
        }
        
        // Отображение бронирований
        function renderBookings() {
            const container = document.getElementById('bookings-list');
            
            if (appState.bookings.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-calendar-times text-6xl text-gray-600 mb-4"></i>
                        <p class="text-gray-400">У вас пока нет бронирований</p>
                        <button class="btn-primary mt-4 px-6 py-2 rounded-xl" onclick="switchScreen('locations')">
                            Найти локацию
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            
            appState.bookings.forEach(booking => {
                const card = document.createElement('div');
                card.className = 'glass-effect rounded-2xl p-4';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="text-lg font-bold text-white">${booking.locationName}</h3>
                            <p class="text-gray-400 text-sm">📍 ${booking.address}</p>
                        </div>
                        <span class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-sm">${booking.status}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-4 text-sm">
                        <div>
                            <p class="text-gray-500">Дата:</p>
                            <p class="text-white">${booking.date}</p>
                        </div>
                        <div>
                            <p class="text-gray-500">Время:</p>
                            <p class="text-white">${booking.time}</p>
                        </div>
                        <div>
                            <p class="text-gray-500">Длительность:</p>
                            <p class="text-white">${booking.duration} час(а)</p>
                        </div>
                        <div>
                            <p class="text-gray-500">Стоимость:</p>
                            <p class="text-accent font-bold">${booking.totalCubes} 🧊</p>
                        </div>
                    </div>
                    <div class="border-t border-accent/20 pt-3">
                        <p class="text-gray-400 text-xs mb-2">QR-код для входа:</p>
                        <div class="qr-code-container mx-auto w-fit" id="qr-${booking.id}"></div>
                        <p class="text-gray-500 text-xs text-center mt-2">Покажите администратору</p>
                    </div>
                `;
                container.appendChild(card);
                
                // Генерация QR-кода
                setTimeout(() => {
                    new QRCode(document.getElementById(`qr-${booking.id}`), {
                        text: booking.qrCode,
                        width: 128,
                        height: 128,
                        colorDark: "#0a0a0f",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }, 100);
            });
        }
        
        // Инициализация приложения
        function initApp() {
            initThreeCube();
            updateBalanceDisplay();
            
            // Добавление тестового бронирования
            if (appState.bookings.length === 0) {
                appState.bookings.push({
                    id: Date.now(),
                    locationName: "KUBIX Центр",
                    address: "ул. Большая Покровская, 47",
                    date: "2024-12-25",
                    time: "14:00",
                    duration: 2,
                    totalCubes: 4,
                    status: 'Активно',
                    qrCode: 'KUBIX-TEST-BOOKING-001'
                });
            }
        }
        
        // Запуск приложения
        initApp();
    </script>
</body>
</html>
